
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>迷你淘宝</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome 图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 飞入动画元素样式 */
        .fly-item {
            position: fixed;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            overflow: hidden;
            z-index: 9999;
            transition: all 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            opacity: 0.8;
            background-size: cover;
            background-position: center;
        }

        /* 全局提示框 */
        .toast {
            position: fixed;
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            z-index: 10000;
            opacity: 0;
            transition: opacity 0.3s;
            white-space: nowrap;
        }
        .toast.show { opacity: 1; }

        /* 支付成功模态框 */
        .modal-mask {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 10001;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .modal-mask.show {
            opacity: 1;
            pointer-events: auto;
        }
        .modal-content {
            background: white;
            border-radius: 16px;
            padding: 32px;
            width: 80%;
            max-width: 320px;
            text-align: center;
            transform: scale(0.8);
            transition: transform 0.3s;
        }
        .modal-mask.show .modal-content { transform: scale(1); }

        /* 高度常量 */
        .top-height { height: 56px; }
        .nav-height { height: 64px; }
    </style>
</head>
<body class="bg-gray-100 font-sans">
    <!-- 首页顶部搜索栏（固定悬浮） -->
    <div id="top-bar-home" class="fixed top-0 left-0 right-0 bg-[#FF5000] top-height z-50 flex items-center px-4">
        <div class="flex-1 bg-white rounded-full h-10 flex items-center px-4 mx-2">
            <i class="fas fa-search text-gray-400 mr-2"></i>
            <input type="text" placeholder="搜索商品" class="flex-1 outline-none text-sm">
        </div>
        <i class="fas fa-shopping-cart text-white text-xl"></i>
    </div>

    <!-- 购物车页顶部 -->
    <div id="top-bar-cart" class="hidden fixed top-0 left-0 right-0 bg-white top-height z-50 flex items-center justify-center shadow-sm">
        <span class="text-lg font-medium">购物车</span>
    </div>

    <!-- 我的页顶部 -->
    <div id="top-bar-mine" class="hidden fixed top-0 left-0 right-0 bg-white top-height z-50 flex items-center justify-center shadow-sm">
        <span class="text-lg font-medium">我的</span>
    </div>

    <!-- 主内容区域（顶部栏高度预留pt-14，底部导航预留pb-16） -->
    <div id="content-area" class="pt-14 pb-16 min-h-screen">
        <!-- 首页 -->
        <div id="page-home" class="p-4">
            <div class="grid grid-cols-2 gap-4" id="product-grid">
                <!-- 商品由JS动态生成 -->
            </div>
        </div>

        <!-- 购物车页 -->
        <div id="page-cart" class="hidden p-4">
            <!-- 空购物车提示 -->
            <div id="cart-empty" class="hidden flex flex-col items-center justify-center h-64 text-gray-400">
                <i class="fas fa-shopping-cart text-6xl mb-4"></i>
                <p>购物车空空如也，快去逛逛吧~</p>
            </div>
            <!-- 购物车商品列表 -->
            <div id="cart-list" class="space-y-4"></div>
        </div>

        <!-- 我的页 -->
        <div id="page-mine" class="hidden p-4 flex flex-col items-center">
            <div class="w-24 h-24 rounded-full bg-[#FF5000] flex items-center justify-center text-white text-4xl mt-8 mb-4">
                <i class="fas fa-user"></i>
            </div>
            <p class="text-lg font-medium mb-2">迷你淘宝用户</p>
            <p class="text-gray-500 text-sm">欢迎来到迷你淘宝~</p>
        </div>
    </div>

    <!-- 底部导航栏（固定底部） -->
    <div class="fixed bottom-0 left-0 right-0 bg-white shadow-lg nav-height flex items-center justify-around z-50 border-t border-gray-200">
        <div class="tab-item flex flex-col items-center justify-center flex-1 py-2 cursor-pointer" data-tab="home">
            <i class="fas fa-home text-xl text-gray-400 tab-icon"></i>
            <span class="text-xs mt-1 text-gray-400 tab-text">首页</span>
        </div>
        <div class="tab-item flex flex-col items-center justify-center flex-1 py-2 cursor-pointer" data-tab="cart">
            <div class="relative">
                <i class="fas fa-shopping-cart text-xl text-gray-400 tab-icon"></i>
                <span id="cart-badge" class="hidden absolute -top-2 -right-2 bg-[#FF5000] text-white text-xs rounded-full w-5 h-5 flex items-center justify-center">0</span>
            </div>
            <span class="text-xs mt-1 text-gray-400 tab-text">购物车</span>
        </div>
        <div class="tab-item flex flex-col items-center justify-center flex-1 py-2 cursor-pointer" data-tab="mine">
            <i class="fas fa-user text-xl text-gray-400 tab-icon"></i>
            <span class="text-xs mt-1 text-gray-400 tab-text">我的</span>
        </div>
    </div>

    <!-- 购物车结算栏（固定在导航栏上方） -->
    <div id="cart-footer" class="hidden fixed bottom-16 left-0 right-0 bg-white shadow-lg h-14 flex items-center justify-between px-4 z-40 border-t border-gray-200">
        <div class="flex items-center">
            <input type="checkbox" id="select-all" class="w-5 h-5 accent-[#FF5000] mr-2">
            <label for="select-all" class="text-sm">全选</label>
        </div>
        <div class="flex items-center">
            <div class="mr-4">
                <span class="text-sm text-gray-500">合计：</span>
                <span id="total-price" class="text-lg font-medium text-[#FF5000]">￥0.00</span>
            </div>
            <button id="checkout-btn" class="bg-[#FF5000] text-white px-6 py-2 rounded-full text-sm disabled:opacity-50" disabled>结算(0)</button>
        </div>
    </div>

    <!-- 全局提示框 -->
    <div id="toast" class="toast"></div>

    <!-- 支付成功模态框 -->
    <div id="pay-modal" class="modal-mask">
        <div class="modal-content">
            <div class="w-16 h-16 rounded-full bg-green-100 flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-check text-3xl text-green-500"></i>
            </div>
            <h3 class="text-xl font-medium mb-2">支付成功！</h3>
            <p class="text-gray-500 text-sm mb-6">您的订单已支付完成，感谢购买~</p>
            <button id="close-modal" class="bg-[#FF5000] text-white px-8 py-2 rounded-full text-sm">确定</button>
        </div>
    </div>

    <script>
        // 预设商品数据
        const products = [
            { id: 1, name: '新款智能手机', price: 3999, sales: 1234, image: 'https://picsum.photos/id/1/300/300' },
            { id: 2, name: '女王同款皇冠', price: 299, sales: 5678, image: 'https://picsum.photos/id/20/300/300' },
            { id: 3, name: '高阶阿法药剂', price: 199, sales: 987, image: 'https://picsum.photos/id/30/300/300' },
            { id: 4, name: '无线蓝牙耳机', price: 599, sales: 2345, image: 'https://picsum.photos/id/40/300/300' },
            { id: 5, name: '纯棉运动T恤', price: 89, sales: 12345, image: 'https://picsum.photos/id/50/300/300' },
            { id: 6, name: '便携式充电宝', price: 129, sales: 6789, image: 'https://picsum.photos/id/60/300/300' },
            { id: 7, name: '智能运动手环', price: 299, sales: 3456, image: 'https://picsum.photos/id/70/300/300' },
            { id: 8, name: '家用小型加湿器', price: 159, sales: 4321, image: 'https://picsum.photos/id/80/300/300' }
        ];

        // 购物车数据（持久化到localStorage）
        let cart = JSON.parse(localStorage.getItem('mini-taobao-cart')) || [];
        let currentPage = 'home';

        // 保存购物车到本地存储
        function saveCart() {
            localStorage.setItem('mini-taobao-cart', JSON.stringify(cart));
        }

        // 页面切换逻辑
        function switchPage(page) {
            currentPage = page;
            // 隐藏所有页面和顶部栏
            ['page-home', 'page-cart', 'page-mine'].forEach(id => {
                document.getElementById(id).classList.add('hidden');
            });
            ['top-bar-home', 'top-bar-cart', 'top-bar-mine'].forEach(id => {
                document.getElementById(id).classList.add('hidden');
            });
            document.getElementById('cart-footer').classList.add('hidden');

            // 显示目标页面和对应顶部栏
            if (page === 'home') {
                document.getElementById('page-home').classList.remove('hidden');
                document.getElementById('top-bar-home').classList.remove('hidden');
            } else if (page === 'cart') {
                document.getElementById('page-cart').classList.remove('hidden');
                document.getElementById('top-bar-cart').classList.remove('hidden');
                document.getElementById('cart-footer').classList.remove('hidden');
                renderCart();
            } else if (page === 'mine') {
                document.getElementById('page-mine').classList.remove('hidden');
                document.getElementById('top-bar-mine').classList.remove('hidden');
            }

            // 更新底部导航高亮状态
            document.querySelectorAll('.tab-item').forEach(item => {
                const tab = item.dataset.tab;
                const icon = item.querySelector('.tab-icon');
                const text = item.querySelector('.tab-text');
                if (tab === page) {
                    icon.classList.replace('text-gray-400', 'text-[#FF5000]');
                    text.classList.replace('text-gray-400', 'text-[#FF5000]');
                } else {
                    icon.classList.replace('text-[#FF5000]', 'text-gray-400');
                    text.classList.replace('text-[#FF5000]', 'text-gray-400');
                }
            });
        }

        // 渲染首页商品列表
        function renderProducts() {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = '';
            products.forEach(product => {
                const card = document.createElement('div');
                card.className = 'bg-white rounded-lg overflow-hidden shadow-sm';
                card.innerHTML = `
                    <img src="${product.image}" alt="${product.name}" class="w-full h-40 object-cover">
                    <div class="p-3">
                        <h3 class="text-sm font-medium line-clamp-2 mb-2">${product.name}</h3>
                        <div class="flex items-center justify-between mb-2">
                            <span class="text-[#FF5000] font-bold text-base">￥${product.price}</span>
                            <span class="text-gray-400 text-xs">销量${product.sales}</span>
                        </div>
                        <button class="add-to-cart w-full bg-[#FF5000] text-white text-sm py-2 rounded-md hover:bg-[#e64500] transition-colors" data-id="${product.id}">
                            加入购物车
                        </button>
                    </div>
                `;
                grid.appendChild(card);
            });

            // 绑定加入购物车事件
            document.querySelectorAll('.add-to-cart').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const productId = parseInt(e.target.dataset.id);
                    addToCart(productId, e);
                });
            });
        }

        // 加入购物车逻辑（含飞入动画）
        function addToCart(productId, event) {
            const product = products.find(p => p.id === productId);
            if (!product) return;

            const existItem = cart.find(item => item.id === productId);
            if (existItem) {
                existItem.count += 1;
            } else {
                cart.push({
                    id: product.id,
                    name: product.name,
                    price: product.price,
                    image: product.image,
                    count: 1,
                    checked: true
                });
            }

            saveCart();
            updateCartBadge();
            showToast('已加入购物车');
            flyAnimation(event, product.image);
        }

        // 飞入动画实现
        function flyAnimation(event, imgUrl) {
            const btnRect = event.target.getBoundingClientRect();
            const startX = btnRect.left + btnRect.width / 2;
            const startY = btnRect.top + btnRect.height / 2;

            const cartIcon = document.querySelector('[data-tab="cart"] .fa-shopping-cart');
            const endRect = cartIcon.getBoundingClientRect();
            const endX = endRect.left + endRect.width / 2;
            const endY = endRect.top + endRect.height / 2;

            const flyEl = document.createElement('div');
            flyEl.className = 'fly-item';
            flyEl.style.left = startX + 'px';
            flyEl.style.top = startY + 'px';
            flyEl.style.backgroundImage = `url(${imgUrl})`;
            document.body.appendChild(flyEl);

            requestAnimationFrame(() => {
                flyEl.style.left = endX + 'px';
                flyEl.style.top = endY + 'px';
                flyEl.style.opacity = '0';
                flyEl.style.transform = 'scale(0.2)';
            });

            setTimeout(() => flyEl.remove(), 800);
        }

        // 显示全局提示
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 1500);
        }

        // 更新购物车角标
        function updateCartBadge() {
            const badge = document.getElementById('cart-badge');
            const total = cart.reduce((sum, item) => sum + item.count, 0);
            if (total > 0) {
                badge.textContent = total > 99 ? '99+' : total;
                badge.classList.remove('hidden');
            } else {
                badge.classList.add('hidden');
            }
        }

        // 渲染购物车页面
        function renderCart() {
            const cartList = document.getElementById('cart-list');
            const cartEmpty = document.getElementById('cart-empty');
            
            if (cart.length === 0) {
                cartList.innerHTML = '';
                cartEmpty.classList.remove('hidden');
                cartList.classList.add('hidden');
            } else {
                cartEmpty.classList.add('hidden');
                cartList.classList.remove('hidden');
                cartList.innerHTML = '';

                cart.forEach(item => {
                    const cartItem = document.createElement('div');
                    cartItem.className = 'bg-white rounded-lg p-4 flex items-center shadow-sm';
                    cartItem.innerHTML = `
                        <input type="checkbox" class="cart-checkbox w-5 h-5 accent-[#FF5000] mr-4" data-id="${item.id}" ${item.checked ? 'checked' : ''}>
                        <img src="${item.image}" alt="${item.name}" class="w-16 h-16 object-cover rounded-md mr-4">
                        <div class="flex-1">
                            <h4 class="text-sm font-medium line-clamp-1">${item.name}</h4>
                            <p class="text-[#FF5000] font-bold text-sm my-1">￥${item.price}</p>
                            <div class="flex items-center justify-between">
                                <div class="flex items-center border border-gray-200 rounded-md">
                                    <button class="minus-btn px-2 py-1 text-gray-500 hover:bg-gray-100" data-id="${item.id}">-</button>
                                    <span class="count px-3 py-1 text-sm">${item.count}</span>
                                    <button class="plus-btn px-2 py-1 text-gray-500 hover:bg-gray-100" data-id="${item.id}">+</button>
                                </div>
                                <button class="delete-btn text-gray-400 text-sm hover:text-red-500" data-id="${item.id}">删除</button>
                            </div>
                        </div>
                    `;
                    cartList.appendChild(cartItem);
                });

                bindCartEvents();
            }

            updateTotalPrice();
            updateSelectAllState();
            updateCartBadge();
        }

        // 绑定购物车项事件
        function bindCartEvents() {
            // 单选
            document.querySelectorAll('.cart-checkbox').forEach(checkbox => {
                checkbox.addEventListener('change', function() {
                    const id = parseInt(this.dataset.id);
                    const item = cart.find(i => i.id === id);
                    if (item) {
                        item.checked = this.checked;
                        saveCart();
                        updateTotalPrice();
                        updateSelectAllState();
                    }
                });
            });

            // 增加数量
            document.querySelectorAll('.plus-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const id = parseInt(this.dataset.id);
                    const item = cart.find(i => i.id === id);
                    if (item) {
                        item.count += 1;
                        saveCart();
                        renderCart();
                    }
                });
            });

            // 减少数量（减到1时再点删除商品）
            document.querySelectorAll('.minus-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const id = parseInt(this.dataset.id);
                    const item = cart.find(i => i.id === id);
                    if (item) {
                        if (item.count === 1) {
                            cart = cart.filter(i => i.id !== id);
                        } else {
                            item.count -= 1;
                        }
                        saveCart();
                        renderCart();
                    }
                });
            });

            // 删除商品
            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const id = parseInt(this.dataset.id);
                    cart = cart.filter(i => i.id !== id);
                    saveCart();
                    renderCart();
                });
            });
        }

        // 更新总金额
        function updateTotalPrice() {
            const selectedItems = cart.filter(item => item.checked);
            const total = selectedItems.reduce((sum, item) => sum + item.price * item.count, 0);
            document.getElementById('total-price').textContent = `￥${total.toFixed(2)}`;

            const checkoutBtn = document.getElementById('checkout-btn');
            const count = selectedItems.reduce((sum, item) => sum + item.count, 0);
            checkoutBtn.disabled = count === 0;
            checkoutBtn.textContent = `结算(${count})`;
        }

        // 更新全选状态
        function updateSelectAllState() {
            const selectAll = document.getElementById('select-all');
            if (cart.length === 0) {
                selectAll.checked = false;
                return;
            }
            selectAll.checked = cart.every(item => item.checked);
        }

        // 全选/取消全选
        document.getElementById('select-all').addEventListener('change', function() {
            const checked = this.checked;
            cart.forEach(item => item.checked = checked);
                saveCart();
            renderCart();
        });

        // 结算逻辑
        document.getElementById('checkout-btn').addEventListener('click', () => {
            document.getElementById('pay-modal').classList.add('show');
        });

        // 关闭支付弹窗
        document.getElementById('close-modal').addEventListener('click', () => {
            document.getElementById('pay-modal').classList.remove('show');
            // 支付后清空已选商品（模拟真实流程）
            cart = cart.filter(item => !item.checked);
            saveCart();
            renderCart();
        });

        // 底部导航切换事件
        document.querySelectorAll('.tab-item').forEach(item => {
            item.addEventListener('click', () => {
                switchPage(item.dataset.tab);
            });
        });

        // 页面初始化
        renderProducts();
        updateCartBadge();
        switchPage('home');
    </script>
</body>
</html>
